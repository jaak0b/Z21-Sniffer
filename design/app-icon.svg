<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Z21 Feedback Sniffer — magnifier over track</title>
  <defs>
    <radialGradient id="blackTile" cx="40%" cy="30%" r="90%">
      <stop offset="0%" stop-color="#1d1d1f"/><stop offset="100%" stop-color="#060607"/>
    </radialGradient>
    <radialGradient id="glassN" cx="40%" cy="32%" r="80%">
      <stop offset="0%" stop-color="#e8ebf2" stop-opacity="0.24"/>
      <stop offset="50%" stop-color="#aeb4c2" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#0a0b0d" stop-opacity="0.36"/>
    </radialGradient>
    <radialGradient id="floorB" cx="50%" cy="36%" r="72%">
      <stop offset="0%" stop-color="#232427"/><stop offset="100%" stop-color="#0b0c0d"/>
    </radialGradient>
    <linearGradient id="railSteel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9aa3b2"/><stop offset="50%" stop-color="#6c7484"/><stop offset="100%" stop-color="#454b57"/>
    </linearGradient>
    <linearGradient id="gInner" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#121212"/><stop offset="100%" stop-color="#2a2c2f"/>
    </linearGradient>
    <linearGradient id="gZ" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#aee35d"/><stop offset="46%" stop-color="#79b81f"/><stop offset="100%" stop-color="#3c5e12"/>
    </linearGradient>
    <filter id="sh" x="-60%" y="-60%" width="220%" height="220%">
      <feDropShadow dx="0" dy="7" stdDeviation="7" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <clipPath id="scene"><circle cx="110" cy="110" r="63"/></clipPath>
  </defs>

  <rect x="10" y="10" width="236" height="236" rx="52" fill="url(#blackTile)"/>

  <rect x="151" y="98" width="92" height="30" rx="15" transform="rotate(45 110 110)" fill="#0a0b0d" opacity="0.45"/>
  <rect x="150" y="95" width="90" height="30" rx="15" transform="rotate(45 110 110)" fill="url(#gZ)"/>

  <g clip-path="url(#scene)">
    <rect x="40" y="40" width="140" height="140" fill="url(#floorB)"/>
    <g fill="#2b3033">
      <polygon points="72,168 148,168 145,162 75,162"/>
      <polygon points="75,140 145,140 142.5,135 77.5,135"/>
      <polygon points="78,112 142,112 140,107 80,107"/>
      <polygon points="81,84 139,84 137.5,80 82.5,80"/>
      <polygon points="84,60 136,60 134.5,57 85.5,57"/>
    </g>
    <polygon points="89.3,46 93.1,46 83,174 77,174" fill="url(#railSteel)"/>
    <polygon points="126.9,46 130.7,46 143,174 137,174" fill="url(#railSteel)"/>
    <line x1="80" y1="174" x2="91.2" y2="46" stroke="#cfd6e2" stroke-opacity="0.45" stroke-width="1.8"/>
    <line x1="140" y1="174" x2="128.8" y2="46" stroke="#cfd6e2" stroke-opacity="0.45" stroke-width="1.8"/>
    <rect x="40" y="40" width="140" height="140" fill="url(#glassN)"/>
    <ellipse cx="88" cy="82" rx="40" ry="17" transform="rotate(-32 88 82)" fill="#fff" opacity="0.15"/>
  </g>

  <circle cx="110" cy="110" r="72" fill="none" stroke="url(#gZ)" stroke-width="18"/>
  <circle cx="110" cy="110" r="81" fill="none" stroke="#0a0b0d" stroke-opacity="0.5" stroke-width="2"/>
  <circle cx="110" cy="110" r="63.5" fill="none" stroke="url(#gInner)" stroke-width="3"/>
  <path d="M74 78 A72 72 0 0 1 120 66" fill="none" stroke="#fff" stroke-opacity="0.5" stroke-width="3" stroke-linecap="round"/>
</svg>
