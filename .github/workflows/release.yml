name: Release

# Manual release: publishes a GitHub release with the Windows installer + update feed,
# and notes built from the labelled pull requests since the previous release tag.
# Run it from the Actions tab after bumping the major/minor version in version.json.

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Nerdbank.GitVersioning needs full history to compute the version

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore local tools
        run: dotnet tool restore

      - name: Build installer and publish the release
        run: pwsh ./build.ps1 --target Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
